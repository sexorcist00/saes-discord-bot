# Конфигурация Discord Role Sync Bot

bot:
  # ID главного сервера (замените на свой)
  main_server_id: 1270044270111494144

  # Префикс для команд, (поддержка "!" и слеш-команд)
  command_prefix: "!"

  # ID канала для размещения кнопки синхронизации (опционально)
  sync_button_channel_id: 1456683570574917674

  # ID ролей администраторов (могут использовать админ-команды), по умолчанию - "Administrator" роли
  admin_role_ids:
    - 

  # ID канала для Discord логирования (опционально)
  log_channel_id: 1452598237440770098

  # ID фракционных серверов (source-серверы). Если список пуст — фракционными
  # считаются все сервера бота, кроме главного (main_server_id).
  # Используется для снятия ролей при выходе с главного сервера САЕС.
  fraction_server_ids:
    -

# Flow заявок на получение ролей (порт из lspd-manager)
requests:
  # Включить flow заявок
  enabled: false

  # Канал, где размещается кнопка "Получить роли" (клиентский канал)
  button_channel_id:

  # Канал админ-ревью заявок (одобрение/отклонение)
  admin_channel_id:

  # ID ролей, которые могут одобрять/отклонять заявки.
  # Пустой список = используется проверка прав Administrator.
  admin_role_ids:
    -

# Интеграция с фракционным форумом как источником истины
forum:
  # Включить интеграцию с форумом (нужно для source_of_truth: forum)
  enabled: false

  # Тип провайдера: "http" (реальный форум через HTTP/парсинг) или "stub" (заглушка)
  provider: "stub"

  # Базовый URL форума фракции
  base_url: "https://es.bw-p.ru/lspd/"

  # Таймаут HTTP-запросов к форуму, секунды
  request_timeout_seconds: 10

  # TTL кэша ответов форума, секунды (чтобы не дёргать форум на каждый синк)
  cache_ttl_seconds: 300

sync:
  # Включить автоматическую синхронизацию при изменении ролей
  auto_sync_enabled: true

  # Интервал проверки изменений (в секундах)
  sync_interval_seconds: 300

  # Разрешить массовую синхронизацию всех пользователей
  batch_sync_enabled: true

# Авторизация скрипта ObjMapper через Discord (HTTP API внутри бота)
objmapper:
  # Включить API авторизации ObjMapper
  enabled: true

  # Приём телеметрии использования (батч-хартбит от скрипта). false — эндпоинт молча
  # отвечает ok=false и ничего не пишет (выключить сбор без выката кода).
  telemetry_enabled: true

  # Адрес и порт HTTP API (плагин обращается сюда снаружи — порт должен быть доступен)
  api_host: "0.0.0.0"
  api_port: 3002

  # Время жизни 6-значного токена привязки, в секундах (по умолчанию 1 час)
  token_ttl_seconds: 3600

  # Длина SAMP-ника (валидация на стороне API)
  nick_min_length: 1
  nick_max_length: 24

  # ID ролей на главном сервере, дающих доступ к ObjMapper (нужна ХОТЯ БЫ ОДНА).
  # Пустой список = доступ запрещён всем.
  allowed_role_ids:
    - 1454078570463756398
    - 1454079089177526374
    - 1454079178268741652
    - 1482746270404579481
    - 1454079227929297077
    - 1454079312377548887
    - 1458206723381924114
    - 1457481211776733347
    - 1372180178012340285
    - 1372176880769437777
    - 1270074485365805108

  # Система пожара (WebSocket + воркер-пул). Бэкенд раздаёт place/remove задания
  # клиентам с балансировкой; клиенты считают распространение raycast'ом. Параметры
  # ниже — ДЕФОЛТЫ; админ пожара крутит их живьём через меню скрипта (caps всем).
  fire:
    enabled: false          # выключено до готовности
    # ── Роли ──
    admin_role_ids: []      # роли админа пожара (меню настроек + действия wipe/stop)
    allowed_role_ids: []    # роли пожарного (поджог/тушение); пусто → objmapper.allowed_role_ids
    # ── Сетка / капы / балансировка ──
    grid: 1.8               # шаг огня (плотность пламени); ОБЯЗАН совпадать у всех клиентов, меняется только рестартом
    grid_z: 2.0
    max_cells: 60           # кап очагов на один пожар (incident)
    cooldown_s: 30          # потушенный очаг не вспыхивает это время (сек)
    merge_dist: 8.0         # поджог сливается с ближним пожаром в радиусе (м)
    place_range: 28.0       # макс. дистанция воркер→цель для постановки
    max_inflight: 2         # заданий разом на воркера (заставляет распределять)
    # ── Темп / разгорание / затухание ──
    heat_ramp_per_s: 20     # скорость разгорания очага
    spread_min_heat: 30     # ниже этого heat очаг не распространяется (разгон ≈ 30/20 = 1.5с)
    spread_interval: 1.5    # сек между расчётами спреда на клиенте (плавнее фронт)
    spread_chance: 0.55     # вероятность кандидата в сторону
    spread_max_per_tick: 3  # лимит новых очагов за расчёт
    # ── Rate-модель (тепловой порог; общесерверно, все клиенты считают одинаково) ──
    emit_rate: 0.6          # тепло/сек от очага полной интенсивности соседу вплотную (скорость фронта)
    heat_radius_mul: 1.6    # радиус теплопередачи = mul·grid (форма фронта)
    ignite_threshold: 1.0   # накопленное тепло, при котором кандидат вспыхивает
    fuel_obj_bias: 0.6      # тяга к горючим ОБЪЕКТАМ (инертна без fuel_models)
    fuel_obj_radius: 4.0    # радиус сэмплинга объектов вокруг очага (м)
    fuel_models: []         # горючие model id (калибруется как fuel_surfaces)
    lookahead: 2            # на сколько клеток волна заглядывает за фронт
    wave_budget: 3000       # потолок узлов flood-fill за тик
    wave_enable: true       # мастер-включатель волнового распространения (общесерверно)
    wave_dry_run: true      # true = считать+рисовать волну, но НЕ ставить объекты на сервер
    # ── Модификаторы спреда ──
    wind_x: 0.0             # вектор ветра
    wind_y: 0.0
    wind_strength: 0.0      # 0..1 сила направленного биаса
    slope_bias: 0.0         # вклад «вверх по склону быстрее» (0 = нейтральный симметричный фронт)
    fuel_bias: 0.5          # вклад тяги к горючим поверхностям (инертен без fuel_surfaces)
    fuel_surfaces: []       # surfaceType горючих материалов (калибруется через /firedebug)
    # ── Огнетушитель ──
    ext_water_per_sec: 60   # скорость воды
    ext_range: 12.0         # дальность струи (м)
    ext_radius: 3.0         # радиус захвата (м)

database:
  # Путь к файлу базы данных SQLite
  path: "data/bot.db"

logging:
  # Уровень логирования: DEBUG, INFO, WARNING, ERROR, CRITICAL
  level: "INFO"

  # Путь к файлу логов
  file_path: "logs/bot.log"

  # Максимальный размер файла логов в байтах (10MB)
  max_bytes: 10485760

  # Количество резервных копий файлов логов
  backup_count: 5
